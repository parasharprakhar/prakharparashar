name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project:
          - desktop-chromium
          - desktop-firefox
          - desktop-webkit
          - mobile-chromium
          - mobile-webkit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify CV asset present
        run: |
          if [ ! -f public/Prakhar_Parashar_CV.docx ]; then
            echo "::warning::public/Prakhar_Parashar_CV.docx is missing — dependent tests will be skipped"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ contains(matrix.project, 'firefox') && 'firefox' || contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces & screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.project }}
          path: test-results/
          retention-days: 14
